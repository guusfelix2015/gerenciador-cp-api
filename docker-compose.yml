version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: drop-cp-postgres
    restart: always
    environment:
      POSTGRES_USER: dropcp
      POSTGRES_PASSWORD: dropcp123
      POSTGRES_DB: dropcp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dropcp -d dropcp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
